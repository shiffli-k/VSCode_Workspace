# Spring Profile Set
spring:
  profiles:
    active: base
# JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2c
  datasource:
    url: jdbc:h2:mem:localdb

# DisablingSwagger
springdoc:
  api-docs:
    enabled: false


# Simple Application Properties
myapp:
  prop:
    fooString: CustomFooString
    fooInteger: 99
    fooBoolean: False

# Complex/Large Application Properties | build read
complex:
  myapp:
    prop1: Val1
    prop2: Val2
    prop3: Val3

